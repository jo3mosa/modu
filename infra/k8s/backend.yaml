# 1. 백엔드 애플리케이션 배포 설정 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modu-backend
  namespace: modu-apps
  labels:
    app: backend
spec:
  # [S14P31B106-345] REMOTE 모드 (market.feed.client-mode=REMOTE) 적용 후 replicas 복원.
  # Gateway 가 KIS 단일세션을 단독 보유하므로 backend 는 자유롭게 수평 확장 가능.
  # 응급조치(replicas=1) 기간 종료 — REMOTE 모드에서 다중 pod 정상 동작 검증 완료.
  replicas: 2
  # [정리] 옛 ReplicaSet 누적 방지 (기본 10). 잦은 재배포로 RS 20개+ 쌓이던 문제 완화.
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # [인증] ECR 프라이빗 리포지토리 접근 권한을 위해 생성한 'regcred' 시크릿을 사용합니다.
      # 이 설정이 누락되면 'ImagePullBackOff' 에러가 발생합니다.
      imagePullSecrets:
      - name: regcred
      containers:
      - name: backend
        # [자동화] Jenkinsfile의 sed 명령어(s|BACKEND_IMAGE|...)가 이 자리에 실제 이미지 주소와 태그를 주입합니다.
        # 태그가 꼬이지 않도록 '_PLACEHOLDER'를 제거한 순수 키워드만 남겨두었습니다.
        image: BACKEND_IMAGE
        ports:
        - containerPort: 8080 # 애플리케이션(Spring Boot 등)이 내부에서 사용하는 포트
        # modu-secret의 모든 키를 환경변수로 주입합니다
        envFrom:
        - secretRef:
            name: modu-secret
        env:
        # [S14P31B106-345] 시세 Feed 모드 — REMOTE: KIS WS 는 modu-kis-gateway 가 단독 보유,
        # backend 는 Redis Pub/Sub 으로 tick 만 수신. replicas N 안전.
        # LOCAL 로 두면 backend 가 직접 KIS WS 연결 → replicas≥2 환경에서 단일세션 충돌 발생.
        - name: MARKET_FEED_CLIENT_MODE
          value: "REMOTE"
        resources:
          # Spring Boot JVM(~300Mi) + Kafka 컨슈머/프로듀서 + JPA + SSE 연결 유지
          # 거래시간 burst 대응 위해 limits 여유 확보.
          # CPU request: 실측 ~21m 기반 — burst 와 GC 대비 150m 로 보수적 설정.
          # 단일 노드 K3s 자원 확보 (이전 300m 시 노드 CPU requests 98% 도달).
          requests:
            memory: "768Mi"
            cpu: "150m"
          limits:
            memory: "1536Mi"
            cpu: "1500m"
        # [중요] startupProbe — 단일 노드 K3s 에서 Spring Boot 부트가 100초+ 걸려
        # 기존 liveness(delay 60s, timeout 1s 기본)가 부팅 중인 앱을 죽여 CrashLoop 발생했음.
        # startupProbe 통과 전까지 liveness/readiness 비활성 → 부팅을 최대 5분(30×10s) 대기.
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        # Pod가 트래픽 받을 준비가 됐는지 확인 — 준비 전까지 트래픽 차단
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 3   # 기본 1s → 3s (DB/Redis health 체크 여유)
          failureThreshold: 5
        # Pod가 살아있는지 확인 — 실패 시 자동 재시작 (startupProbe 통과 후에만 동작)
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 20
          timeoutSeconds: 5   # 기본 1s → 5s (transient 지연 흡수)
          failureThreshold: 5

---

# 2. 백엔드 내부 통신을 위한 서비스 설정 (Service)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: modu-apps
spec:
  selector:
    app: backend # 위의 Deployment 라벨과 일치하여 트래픽을 전달합니다.
  ports:
  - name: http     # ServiceMonitor (infra/k8s/backend-servicemonitor.yaml) 가 이 이름으로 참조
    protocol: TCP
    port: 80       # 서비스가 클러스터 내부에서 노출할 포트
    targetPort: 8080 # 실제 컨테이너 내부로 전달할 포트
  # [보안/설계] 백엔드는 외부 노출 없이 클러스터 내부(프론트엔드 -> 백엔드) 통신만 허용하는 ClusterIP 타입을 사용합니다.
  type: ClusterIP

---

# 3. PodDisruptionBudget — 노드 drain/유지보수 시 최소 1개 backend 가용 보장.
# replicas≥2 + REMOTE 모드에서 K8s 가 한 번에 모두 evict 하지 못하게 막아 무중단 보장.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: modu-apps
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend