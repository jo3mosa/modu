# 1. 뉴스 데이터 영구 저장을 위한 스토리지 요청
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: modu-apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

# 2. MongoDB 배포 설정
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modu-mongodb
  namespace: modu-apps
spec:
  replicas: 1
  # PVC(ReadWriteOnce) 환경에서 RollingUpdate 는 새/옛 Pod 동시 존재 시 PVC lock 충돌.
  # Recreate 는 옛 Pod 먼저 종료 후 새 Pod 시작 — 단일 PVC 운영에 안전.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: MONGO_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: MONGO_PASSWORD
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: MONGO_DB
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
        resources:
          # WiredTiger 캐시 = (메모리 - 1Gi) × 50% — limit 4Gi 기준 약 1.5Gi 캐시.
          # 뉴스 데이터 누적으로 1Gi/2Gi 환경에서 SIGTERM(eviction/메모리 압박) 발생 → 증액.
          requests:
            memory: "2Gi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        # mongosh exec probe 는 Node.js 런타임 부팅 비용으로 5s timeout 초과 → kubelet SIGTERM 루프.
        # mongod 는 storage engine recovery 완료 후에만 27017 listen → standalone 구성에선 TCP probe 로 충분.
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc

---

# 3. 클러스터 내부 통신용 서비스
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: modu-apps
spec:
  selector:
    app: mongodb
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
    nodePort: 30017
  type: NodePort
