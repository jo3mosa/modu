# [S14P31B106-352] Kafka JMX Exporter 룰셋 — community 표준 패턴
#
# 변경 사유:
#   기존 룰셋은 JMX type 을 메트릭 이름에서 제거해 간결했지만, Grafana 마켓플레이스의
#   주요 Kafka 대시보드(11962, 7589 등)는 type 을 포함한 표준 패턴
#   (예: kafka_controller_kafkacontroller_activecontrollercount) 을 기대한다.
#   대시보드 PromQL 수십 개를 수정하느니 룰셋을 표준에 맞추는 게 유지보수에 유리.
#
# 동작 흐름:
#   kafka pod 내부 JMX MBean
#     -> jmx_prometheus_javaagent (이 파일의 rule 로 변환)
#     -> :9404/metrics (Prometheus text format)
#     -> ServiceMonitor (kafka-servicemonitor.yaml) -> kube-prom Prometheus
#
# 적용 후 Kafka pod 롤링 재기동 필요 — javaagent 는 시작 시점에만 룰 yaml 을 로드.
#   kubectl apply -f infra/k8s/kafka-jmx-config.yaml
#   kubectl rollout restart statefulset/kafka -n modu-apps
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-jmx-config
  namespace: modu-apps
data:
  kafka-jmx-exporter.yml: |
    # Prometheus 컨벤션 — 소문자 + 스네이크케이스
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true

    rules:
      # ──────────────────────────────────────────────────────────────────
      # 1. BrokerTopicMetrics — 토픽별/전체 처리량
      #    예: MessagesInPerSec, BytesInPerSec, FailedFetchRequestsPerSec
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>Count
        name: kafka_server_brokertopicmetrics_$1_total
        type: COUNTER
        labels:
          topic: "$2"
      - pattern: kafka.server<type=BrokerTopicMetrics, name=(.+)><>Count
        name: kafka_server_brokertopicmetrics_$1_total
        type: COUNTER
      - pattern: kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>OneMinuteRate
        name: kafka_server_brokertopicmetrics_$1_one_minute_rate
        type: GAUGE
        labels:
          topic: "$2"

      # ──────────────────────────────────────────────────────────────────
      # 2. RequestMetrics — 요청별 latency 분위수 / 처리량
      #    예: TotalTimeMs, RequestsPerSec
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>(\d+)thPercentile
        name: kafka_network_requestmetrics_$1
        type: GAUGE
        labels:
          request: "$2"
          quantile: "0.$3"
      - pattern: kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>Mean
        name: kafka_network_requestmetrics_$1
        type: GAUGE
        labels:
          request: "$2"
          quantile: "0.50"
      - pattern: kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>(Count|OneMinuteRate)
        name: kafka_network_requestmetrics_$1
        type: GAUGE
        labels:
          request: "$2"

      # ──────────────────────────────────────────────────────────────────
      # 3. Controller — type=KafkaController 를 메트릭 이름에 포함시켜
      #    표준 대시보드(11962 등)와 호환. 핵심 지표:
      #      kafka_controller_kafkacontroller_activecontrollercount     ( = 1 정상)
      #      kafka_controller_kafkacontroller_offlinepartitionscount   ( = 0 정상)
      #      kafka_controller_kafkacontroller_globaltopiccount
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.controller<type=(.+), name=(.+)><>Value
        name: kafka_controller_$1_$2
        type: GAUGE
      - pattern: kafka.controller<type=(.+), name=(.+)><>(Count|OneMinuteRate)
        name: kafka_controller_$1_$2
        type: GAUGE

      # ──────────────────────────────────────────────────────────────────
      # 4. Network SocketServer — NetworkProcessorAvgIdlePercent 등
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.network<type=(.+), name=(.+)><>Value
        name: kafka_network_$1_$2
        type: GAUGE

      # ──────────────────────────────────────────────────────────────────
      # 5. ReplicaManager — UnderReplicatedPartitions, ISR shrink/expand
      #    클러스터 헬스의 핵심 지표.
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.server<type=ReplicaManager, name=(.+)><>(Value|Count|OneMinuteRate)
        name: kafka_server_replicamanager_$1
        type: GAUGE

      # ──────────────────────────────────────────────────────────────────
      # 6. KafkaRequestHandlerPool — RequestHandlerAvgIdlePercent
      #    Idle < 20% 면 broker 한계 근접.
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.server<type=KafkaRequestHandlerPool, name=(.+)><>(Count|OneMinuteRate)
        name: kafka_server_kafkarequesthandlerpool_$1_count
        type: COUNTER

      # ──────────────────────────────────────────────────────────────────
      # 7. Cluster Partition — Leader/Follower 표시용
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.cluster<type=Partition, name=(.+), topic=(.+), partition=(.+)><>Value
        name: kafka_cluster_partition_$1
        type: GAUGE
        labels:
          topic: "$2"
          partition: "$3"

      # ──────────────────────────────────────────────────────────────────
      # 8. Log size — 디스크 사용량 추정
      # ──────────────────────────────────────────────────────────────────
      - pattern: kafka.log<type=Log, name=(.+), topic=(.+), partition=(.+)><>Value
        name: kafka_log_$1
        type: GAUGE
        labels:
          topic: "$2"
          partition: "$3"

      # ──────────────────────────────────────────────────────────────────
      # 9. JVM 표준 메트릭
      # ──────────────────────────────────────────────────────────────────
      - pattern: java.lang<type=Memory><HeapMemoryUsage>(\w+)
        name: jvm_memory_heap_$1_bytes
        type: GAUGE
      - pattern: java.lang<type=Memory><NonHeapMemoryUsage>(\w+)
        name: jvm_memory_nonheap_$1_bytes
        type: GAUGE
      - pattern: java.lang<type=GarbageCollector, name=(.+)><>CollectionCount
        name: jvm_gc_collection_count_total
        type: COUNTER
        labels:
          gc: "$1"
      - pattern: java.lang<type=GarbageCollector, name=(.+)><>CollectionTime
        name: jvm_gc_collection_time_ms_total
        type: COUNTER
        labels:
          gc: "$1"
      - pattern: java.lang<type=Threading><>ThreadCount
        name: jvm_threads_count
        type: GAUGE
