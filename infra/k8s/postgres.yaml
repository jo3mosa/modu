# 1. 데이터 영속성을 위한 스토리지 요청
# K3s는 local-path provisioner가 내장되어 있어 자동으로 볼륨을 생성합니다
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: modu-apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

# 2. PostgreSQL 배포 설정
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modu-postgres
  namespace: modu-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        # Secret에서 DB 접속 정보를 주입합니다
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: DB_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: modu-secret
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # DB가 준비됐는지 확인 — 준비 전까지 백엔드 트래픽 차단
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
          initialDelaySeconds: 5   # 컨테이너 시작 후 5초 뒤부터 체크
          periodSeconds: 5         # 5초마다 체크
          failureThreshold: 3      # 3번 실패 시 NotReady 처리
        # DB가 살아있는지 확인 — 실패 시 컨테이너 자동 재시작
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
          initialDelaySeconds: 30  # 초기 기동 시간 여유를 위해 30초 대기
          periodSeconds: 10        # 10초마다 체크
          failureThreshold: 5      # 5번 연속 실패 시 재시작
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---

# 3. 클러스터 내부 통신용 서비스 (백엔드 → postgres-service:5432)
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: modu-apps
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
    nodePort: 30432   # 외부 접속 포트 추가
  type: NodePort      # ClusterIP → NodePort 변경
