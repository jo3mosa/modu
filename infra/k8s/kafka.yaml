# 1. Headless Service — 브로커 간 통신 + StatefulSet DNS 등록
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: modu-apps
spec:
  clusterIP: None
  # Ready 가 아닌 Pod 도 DNS 에 등록 — KRaft quorum 형성 시
  # broker 들이 서로를 찾기 위해 필수 (없으면 순환 데드락).
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093

---

# 2. ClusterIP Service — 백엔드/AI Server 접속용 (kafka-service:9092)
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: modu-apps
spec:
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  type: ClusterIP

---

# 3. PodDisruptionBudget — 롤링 업데이트/노드 유지보수 시 최소 2개 브로커 보장
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kafka-pdb
  namespace: modu-apps
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: kafka

---

# 4. StatefulSet — KRaft 모드 3 브로커
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: modu-apps
spec:
  serviceName: kafka-headless
  replicas: 3
  # KRaft controller quorum 은 voter 들이 동시에 시작되어 서로를 찾아야 형성됨.
  # 기본 OrderedReady 면 kafka-0 가 Ready 될 때까지 kafka-1 시작 보류 → 영구 데드락.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      automountServiceAccountToken: false
      containers:
      - name: kafka
        image: apache/kafka:3.9.0
        command:
          - sh
          - -c
          - |
            export KAFKA_NODE_ID=${HOSTNAME##*-}
            export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${HOSTNAME}.kafka-headless.modu-apps.svc.cluster.local:9092
            exec /etc/kafka/docker/run
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 9093
          name: controller
        env:
        # PVC 마운트 경로를 명시 — 미설정 시 기본값 /tmp/kafka-logs 로 떨어져
        # Pod 재시작마다 데이터 소실 + 매번 새 cluster id 로 시작 → quorum 형성 불가.
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: CLUSTER_ID
          value: "MkU3OEVBNTcwNTJENDM2Qg"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "0@kafka-0.kafka-headless.modu-apps.svc.cluster.local:9093,1@kafka-1.kafka-headless.modu-apps.svc.cluster.local:9093,2@kafka-2.kafka-headless.modu-apps.svc.cluster.local:9093"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://:9092,CONTROLLER://:9093"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_MIN_INSYNC_REPLICAS
          value: "2"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        resources:
          # Kafka JVM heap(~1Gi) + OS file cache(성능 핵심).
          # 운영 안정성 위해 limit 을 JVM heap 2배로 — JVM 1Gi + page cache 1Gi.
          # CPU request: 실측 30m/브로커 기반 — 단일 노드 K3s 자원 확보 위해 150m 로 조정.
          # burst (토픽 생성/리밸런싱) 시점엔 limit 1500m 까지 활용.
          requests:
            memory: "1Gi"
            cpu: "150m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
        # broker port (9092) TCP listen 여부로 헬스 판정.
        # kafka-topics.sh 가 PATH 에 없는 이미지 / 권한 이슈에 영향받지 않음.
        # 토픽 생성은 backend 가 기동 시 처리하므로 broker 가 떠 있는 것이 곧 Ready.
        startupProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          tcpSocket:
            port: 9092
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 9092
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        volumeMounts:
        - name: kafka-storage
          mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
  - metadata:
      name: kafka-storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
