# AI Agent Deployment
# Kafka Consumer (market.signal.detected, ai.trigger.requested 토픽 소비)
# 서버가 아니라 컨슈머이므로 Service 없음
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modu-ai-agent
  namespace: modu-apps
  labels:
    app: ai-agent
spec:
  # 컨슈머는 단일 인스턴스로 실행 (Kafka 컨슈머 그룹이 파티션을 나눠 처리)
  replicas: 1
  # 단일 replica — RollingUpdate 가 새 Pod 먼저 띄우려다 자원 부족 시 deadlock.
  # Recreate: 옛 Pod 먼저 종료 후 새 Pod 시작 — 30s 정도 짧은 중단 감수.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      # ECR 프라이빗 리포지토리 접근 권한 — 누락 시 ImagePullBackOff 발생
      imagePullSecrets:
      - name: regcred
      containers:
      - name: ai-agent
        # Jenkinsfile의 sed 명령어가 실제 이미지 주소와 태그를 주입
        image: AIAGENT_IMAGE
        # modu-secret의 모든 키를 환경변수로 주입 (Kafka/DB 접속 정보 등)
        envFrom:
        - secretRef:
            name: modu-secret
        resources:
          # LLM 외부 API 호출 위주 — 자체 메모리는 적음.
          # 신호 발생 시 응답 처리 burst 대응 위해 CPU limit ↑.
          # CPU request: 실측 10m — Kafka 컨슈머 idle 시간 길어 50m 충분.
          # memory request: 실측 76Mi (14%) — 256Mi 로 축소.
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Kafka 컨슈머 프로세스 생존 여부 확인 — 스레드 비정상 종료 시 재시작
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - import os; os.kill(1, 0)  # PID 1(메인 프로세스) 생존 확인
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
