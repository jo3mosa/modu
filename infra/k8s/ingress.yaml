apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modu-ingress
  namespace: modu-apps
  annotations:
    # Nginx Ingress Controller가 이 Ingress를 처리하도록 지정
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
  - host: k14b106.p.ssafy.io
    http:
      paths:
      # /api/* 요청은 Spring Boot 백엔드로 라우팅
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # 나머지 모든 요청은 React 프론트엔드로 라우팅
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
