apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modu-ingress
  namespace: modu-apps
  annotations:
    # Nginx Ingress Controller가 이 Ingress를 처리하도록 지정
    kubernetes.io/ingress.class: "nginx"
    # SSE(Server-Sent Events): 버퍼링 끔 → 이벤트 실시간 전달 보장
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # SSE/WebSocket: 연결을 1시간 유지 (기본값 60초면 SSE 연결이 끊김)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket: HTTP/1.1 필수 (Upgrade 헤더 지원).
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # WebSocket Upgrade/Connection 헤더 명시 전달 (nginx-ingress → backend).
    # SSAFY K3s 환경에서는 nginx-ingress 가 proxy-http-version: 1.1 만으로
    # WebSocket Upgrade 헤더를 자동 전달하지 못함. snippet 으로 명시 전달 필요.
    #
    # 추가 필수: SSAFY 호스트 nginx(/etc/nginx/sites-enabled/default)에도
    # 동일한 WebSocket 지원 설정 필요 — 외부 호스트 nginx 가 Upgrade 헤더 strip
    # 하던 것을 발견해 별도로 수정함. K8s 매니페스트만으로 해결 불가능했음.
    #
    # 일반 HTTP 요청에 Upgrade/Connection 헤더 추가는 backend 가 무시하므로 부작용 없음.
    # (장기적으로 $connection_upgrade map 변수 사용이 표준이나, 현재 동작 검증된 구성 유지)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  rules:
  - host: k14b106.p.ssafy.io
    http:
      paths:
      # /api/* 요청은 Spring Boot 백엔드로 라우팅
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # /ws/* WebSocket 요청도 백엔드로 라우팅 (호가창, 실시간 체결가 등)
      # ingress annotation 의 proxy-http-version=1.1 + proxy-*-timeout=3600 으로 WS 업그레이드/장기 연결 보장
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # 나머지 모든 요청은 React 프론트엔드로 라우팅
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
