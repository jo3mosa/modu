apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modu-ingress
  namespace: modu-apps
  annotations:
    # Nginx Ingress Controller가 이 Ingress를 처리하도록 지정
    kubernetes.io/ingress.class: "nginx"
    # SSE(Server-Sent Events): 버퍼링 끔 → 이벤트 실시간 전달 보장
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # SSE/WebSocket: 연결을 1시간 유지 (기본값 60초면 SSE 연결이 끊김)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket: HTTP/1.1 필수 (Upgrade 헤더 지원)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
  - host: k14b106.p.ssafy.io
    http:
      paths:
      # /api/* 요청은 Spring Boot 백엔드로 라우팅
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # 나머지 모든 요청은 React 프론트엔드로 라우팅
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
