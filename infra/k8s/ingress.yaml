apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modu-ingress
  namespace: modu-apps
  annotations:
    # Nginx Ingress Controller가 이 Ingress를 처리하도록 지정
    kubernetes.io/ingress.class: "nginx"
    # SSE(Server-Sent Events): 버퍼링 끔 → 이벤트 실시간 전달 보장
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # SSE/WebSocket: 연결을 1시간 유지 (기본값 60초면 SSE 연결이 끊김)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket: HTTP/1.1 필수 (Upgrade 헤더 지원)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # WebSocket Upgrade/Connection 헤더 명시 전달.
    # map 디렉티브는 http 컨텍스트에만 정의 가능 → configuration-snippet (server/location)
    # 에서는 사용 불가. if 분기로 우회해 WebSocket 만 'upgrade', 일반 HTTP/SSE 는 'close'.
    # SSE(/api/v1/orders/connect) 와 안전하게 공존.
    # ⚠️ 이 annotation 이 적용되려면 ingress-nginx ConfigMap 에 `allow-snippet-annotations: "true"` 필수.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      set $proxy_connection close;
      if ($http_upgrade) {
          set $proxy_connection upgrade;
      }
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $proxy_connection;
spec:
  ingressClassName: nginx
  rules:
  - host: k14b106.p.ssafy.io
    http:
      paths:
      # /api/* 요청은 Spring Boot 백엔드로 라우팅
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # /ws/* WebSocket 요청도 백엔드로 라우팅 (호가창, 실시간 체결가 등)
      # ingress annotation 의 proxy-http-version=1.1 + proxy-*-timeout=3600 으로 WS 업그레이드/장기 연결 보장
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # 나머지 모든 요청은 React 프론트엔드로 라우팅
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
