# K8s 배포용 Nginx 설정
# /api/, /ws/ 등 백엔드 프록시는 Ingress Controller 가 처리하므로
# frontend Pod 의 nginx 는 React 정적 파일 서빙만 담당한다.
server {
    listen 80;

    # 빌드된 React 정적 파일 경로
    root /usr/share/nginx/html;
    index index.html;

    # React Router 대응: 새로고침 시 404 방지
    # 존재하는 파일/폴더면 그대로 서빙, 아니면 index.html 로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산(js, css, 이미지) 캐싱 설정
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    }

