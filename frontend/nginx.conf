server {
    listen 80;

    # 빌드된 React 정적 파일 경로
    root /usr/share/nginx/html;
    index index.html;

    # React Router 대응: 새로고침 시 404 방지
    # 존재하는 파일/폴더면 그대로 서빙, 아니면 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산(js, css, 이미지) 캐싱 설정
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # SSE 전용 설정 (docker-compose 로컬 환경)
    # K3s 배포 환경에서는 Ingress Controller가 처리하므로 이 블록은 동작하지 않음
    location /api/v1/orders/connect {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';        # keep-alive 유지 (SSE 필수)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;                   # 버퍼링 끔 (SSE 실시간 전달 핵심)
        proxy_cache off;
        proxy_read_timeout 3600s;              # SSE는 연결을 계속 유지하므로 긴 타임아웃 필요
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
