# ============================================================
# 로컬 개발/테스트용 Docker Compose
# 실행: docker compose up -d
# 종료: docker compose down -v
# ============================================================

services:
  # React 프론트엔드 (Nginx 서빙)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: modu-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - modu-network

  # Spring Boot 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modu-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      KIS_API_URL: ${KIS_API_URL}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      # KIS_CANO: ${KIS_CANO:-}
      # KIS_ACNT_PRDT_CD: ${KIS_ACNT_PRDT_CD:-01}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - modu-network

  # 백엔드 DB
  postgres:
    image: postgres:16-alpine
    container_name: modu-postgres
    environment:
      POSTGRES_DB: modu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - modu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:

networks:
  modu-network:
    driver: bridge
