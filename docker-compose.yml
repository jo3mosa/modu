# ============================================================
# 로컬 개발/테스트용 Docker Compose
# 실행: docker compose up -d
# 종료: docker compose down -v
# ============================================================

# ============================================================
# Anchors
# ============================================================

# analysis_server: engine + 3 collectors 공통 설정.
# 4 서비스가 같은 이미지를 공유하며 command 로 entrypoint 만 차별화.
# 환경변수·볼륨·네트워크·재시작 정책을 묶어 중복 제거.
x-analysis-base: &analysis-base
  build:
    context: ./analysis_server
    dockerfile: Dockerfile
  environment:
    # Redis / Kafka 접속
    REDIS_HOST: ${REDIS_HOST:-redis}
    REDIS_PORT: ${REDIS_PORT:-6379}
    REDIS_DB: ${REDIS_DB:-0}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    # 외부 API 키 (collectors 용)
    KIS_APP_KEY: ${KIS_APP_KEY}
    KIS_APP_SECRET: ${KIS_APP_SECRET}
    KIS_BASE_URL: ${KIS_BASE_URL}
    DART_API_KEY: ${DART_API_KEY}
    MONGO_URI: ${MONGO_URI}
    # DB (backfill 스크립트용 — engine 은 SQLite 사용)
    DB_HOST: ${DB_HOST:-postgres}
    DB_PORT: ${DB_PORT:-5432}
    DB_NAME: ${DB_NAME:-modu_db}
    DB_USERNAME: ${DB_USERNAME:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-localpassword}
  volumes:
    # stock_master.db (SQLite) 공유 — engine/collectors 모두 read 또는 read+write.
    # 호스트 파일 직접 마운트로 컨테이너 재기동 후에도 데이터 보존.
    - ./analysis_server/data:/app/data
  networks:
    - modu-network
  restart: on-failure

# ============================================================
# Services
# ============================================================
services:
  # React 프론트엔드 (Nginx 서빙)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_KAKAO_CLIENT_ID: ${VITE_KAKAO_CLIENT_ID}
      dockerfile: Dockerfile
    container_name: modu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - modu-network
    restart: always

  # Spring Boot 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modu-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      KIS_API_URL: ${KIS_API_URL}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_WEBSOCKET_URL: ${KIS_WEBSOCKET_URL}
      KIS_WEBSOCKET_CONNECTION_TIMEOUT_MS: ${KIS_WEBSOCKET_CONNECTION_TIMEOUT_MS:-5000}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      KIS_ENCRYPTION_KEY: ${KIS_ENCRYPTION_KEY}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      # KIS_CANO: ${KIS_CANO:-}
      # KIS_ACNT_PRDT_CD: ${KIS_ACNT_PRDT_CD:-01}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:                          
        condition: service_healthy
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    networks:
      - modu-network
    restart: on-failure

  # PostgreSQL (백엔드 메인 DB)
  postgres:
    image: postgres:16-alpine
    container_name: modu-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
      - "5433:5432" # 로컬에서 포트 충돌 방지용 (선택적)
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - modu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 캐시 (종목 시세 데이터 TTL 캐싱용)
  redis:
    image: redis:7-alpine
    container_name: modu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - modu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB (뉴스 기사 저장소)
  mongo:
    image: mongo:7
    container_name: modu-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-localpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-modu_news}
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    networks:
      - modu-network
    healthcheck:
      # mongosh ping (mongo 5+ 호환)
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka 브로커 1 (KRaft 모드)
  kafka-0:
    image: apache/kafka:3.9.0
    container_name: modu-kafka-0
    restart: on-failure
    ports:
      - "9092:19092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-0:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./data/kafka-0:/var/lib/kafka/data
    networks:
      - modu-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka 브로커 2 (KRaft 모드)
  kafka-1:
    image: apache/kafka:3.9.0
    container_name: modu-kafka-1
    restart: on-failure
    ports:
      - "9093:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./data/kafka-1:/var/lib/kafka/data
    networks:
      - modu-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka 브로커 3 (KRaft 모드)
  kafka-2:
    image: apache/kafka:3.9.0
    container_name: modu-kafka-2
    restart: on-failure
    ports:
      - "9094:19092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./data/kafka-2:/var/lib/kafka/data
    networks:
      - modu-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # AI 투자 판단 에이전트 (Kafka Consumer)
  ai-agent:
    build:
      context: ./ai_agent
      dockerfile: Dockerfile
    container_name: modu-ai-agent
    environment:
      GMS_KEY: ${GMS_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB:-0}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME:-modu_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-localpassword}@${DB_HOST}:${DB_PORT}/${DB_NAME:-modu_db}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    networks:
      - modu-network
    restart: on-failure

  # KRX 종목 마스터 데이터 파이프라인 (매일 08:00 자동 적재)
  analysis-pipeline:
    build:
      context: ./analysis_server
      dockerfile: Dockerfile
    container_name: modu-analysis-pipeline
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - modu-network
    restart: on-failure

  # ============================================================
  # analysis_server: engine + 3 collectors
  # 같은 이미지를 공유하며 command 로 entrypoint 만 차별화.
  # 공통 설정은 상단 x-analysis-base anchor 참조.
  # ============================================================

  # 1분 cron engine cycle — Redis/DB 의 collector 데이터 읽어 Kafka 발행
  analysis-engine:
    <<: *analysis-base
    container_name: modu-analysis-engine
    command: ["python", "-m", "main"]
    depends_on:
      redis:
        condition: service_healthy
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy

  # KIS 1분봉 → 6 지표 → Redis technical:{stock} (무한 루프, 1 사이클 ≈ 7~10분)
  analysis-candle-collector:
    <<: *analysis-base
    container_name: modu-candle-collector
    command: ["python", "-m", "collectors.candle_collector", "--loop"]
    depends_on:
      redis:
        condition: service_healthy

  # DART list.json batch → Redis event:{stock} (3분 주기)
  analysis-disclosure-collector:
    <<: *analysis-base
    container_name: modu-disclosure-collector
    command: ["python", "-m", "collectors.disclosure_collector", "--loop"]
    depends_on:
      redis:
        condition: service_healthy

  # 한국경제·연합인포맥스 RSS → MongoDB news_articles (10분 주기)
  analysis-news-collector:
    <<: *analysis-base
    container_name: modu-news-collector
    command: ["python", "-m", "collectors.news_collector", "--loop"]
    depends_on:
      mongo:
        condition: service_healthy

networks:
  modu-network:
    driver: bridge
