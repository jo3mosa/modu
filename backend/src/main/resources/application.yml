spring:
  application:
    name: modu-backend
  profiles:
    active: local
  threads:
    virtual:
      enabled: true  # Java 21 가상 스레드 활성화 - 다수 봇의 동시 매매 처리를 위해 사용
  jpa:
    open-in-view: false  # HTTP 요청 전체 수명 동안 DB 커넥션을 점유하는 문제 방지
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
    producer:
      client-id: modu-producer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      compression-type: snappy
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        max.block.ms: 5000
        spring.json.add.type.headers: false
    consumer:
      client-id: modu-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # value-deserializer 와 spring.json.* 설정은 KafkaConsumerConfig 에서 타입별로 명시적으로 구성
      # (yml 자동 설정 + 코드 setter 병행 시 "must be configured ... not both" 충돌 발생)
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        fetch.max.wait.ms: 50
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost,http://k14b106.p.ssafy.io,https://k14b106.p.ssafy.io,https://moduinvestment.co.kr,https://www.moduinvestment.co.kr}
  kafka:
    topic:
      partitions: 3
      replicas: 3
# Actuator: K8s 헬스체크(/health, /readiness) 및 메트릭 수집용
# /actuator/prometheus 는 Prometheus ServiceMonitor (infra/k8s/backend-servicemonitor.yaml) 가 30s 간격으로 scrape
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 한국투자증권 실전투자 API
kis:
  api:
    url: ${KIS_API_URL}
    app-key: ${KIS_APP_KEY}
    app-secret: ${KIS_APP_SECRET}
    cano: ${KIS_CANO:}           # 계좌번호 앞 8자리 (미설정 시 빈값, 실거래 전 필수 입력)
    acnt-prdt-cd: ${KIS_ACNT_PRDT_CD:01}  # 계좌 상품 코드 (일반 주식: 01)
  websocket:
    url: ${KIS_WEBSOCKET_URL}
    reconnect-max-attempts: ${KIS_WEBSOCKET_RECONNECT_MAX_ATTEMPTS:3}
    reconnect-delay-ms: ${KIS_WEBSOCKET_RECONNECT_DELAY_MS:1000}
    connection-timeout-ms: ${KIS_WEBSOCKET_CONNECTION_TIMEOUT_MS:5000}
    allowed-origin-patterns: ${KIS_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost,http://k14b106.p.ssafy.io,https://k14b106.p.ssafy.io,https://moduinvestment.co.kr,https://www.moduinvestment.co.kr}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

# 카카오 OAuth 설정
kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

# AES-256-GCM 암호화 설정 (KIS API 키 암호화용)
encryption:
  kis-key: ${KIS_ENCRYPTION_KEY}


