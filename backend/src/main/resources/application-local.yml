spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:modu_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:localpassword}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 1000

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME:admin}:${MONGO_PASSWORD:localpassword}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:modu_mongo}?authSource=admin
      # news_articles 컬렉션 인덱스를 부팅 시 자동 보장
      # 컬렉션 규모(수만 건) 기준 빌드 1초 미만, 이후 noop
      auto-index-creation: true

# 로컬 디버깅 시 폴링 SQL 노이즈 제거용 (기본 true 라 prod 영향 없음)
modu:
  position-monitor:
    enabled: false
  pending-judgment-expiry:
    enabled: false
