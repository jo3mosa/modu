spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:modu_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:localpassword}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 1000

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME:admin}:${MONGO_PASSWORD:localpassword}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:modu_news}?authSource=admin
